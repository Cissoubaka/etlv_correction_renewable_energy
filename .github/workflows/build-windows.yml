name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Permet d'exécuter manuellement

jobs:
  build:
    runs-on: windows-latest  # ← Exécute sur Windows !
    
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable with PyInstaller
      run: |
        python -m PyInstaller `
          --name=CorrectionApp `
          --onefile `
          --windowed `
          --hidden-import=PyPDF2 `
          --hidden-import=pdfplumber `
          --hidden-import=pdf2image `
          --hidden-import=PIL `
          --hidden-import=openpyxl `
          --hidden-import=odf `
          --hidden-import=correction `
          --collect-all=PyQt5 `
          --distpath=./dist_release `
          app_correction.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: CorrectionApp-Windows
        path: dist_release/CorrectionApp.exe
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist_release/CorrectionApp.exe
